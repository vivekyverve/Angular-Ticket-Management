<div class="container py-4">

    <!-- Page Header -->

    <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()">

        <!-- Ticket Information -->

        <div class="card shadow-sm mb-4">
            <div class="card-header fw-bold">
                <i class="fa-solid fa-ticket ticket-icon"></i>
                Ticket Information
            </div>

            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="tracker">
                            Tracker
                        </label>

                        <input class="form-select" list="tracker-option" id="tracker" formControlName="tracker"
                            (input)="validTracker()" placeholder="Select Tracker">

                        <datalist id="tracker-option">
                            <option *ngFor="let option of trackerOptions" [value]="option">
                            </option>
                        </datalist>

                        <small class="text-danger" *ngIf="ticketForm.get('tracker')?.touched &&
                                   ticketForm.get('tracker')?.invalid">
                            Tracker is required
                        </small>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="subject">
                            Subject
                        </label>

                        <input type="text" class="form-control" formControlName="subject" id="subject"
                            placeholder="Enter Subject">

                        <small class="text-danger" *ngIf="ticketForm.get('subject')?.touched &&
                                   ticketForm.get('subject')?.invalid">
                            Subject is required
                        </small>
                    </div>
                </div>
                <div>

                    <label class="form-label" for="description">
                        Description
                    </label>

                    <textarea rows="5" class="form-control" id="description" formControlName="description"
                        placeholder="Enter Description">
                    </textarea>

                    <small class="text-danger" *ngIf="ticketForm.get('description')?.touched &&
                               ticketForm.get('description')?.invalid">
                        Description is required
                    </small>
                </div>
            </div>
        </div>

        <!-- Assignment -->

        <div class="card shadow-sm mb-4">
            <div class="card-header fw-bold">
                <i class="fa-solid fa-user"></i>
                Assignment & Priority
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="status">
                            Status
                        </label>

                        <input class="form-select" list="status-option" id="status" formControlName="status"
                            (input)="validStatus()" placeholder="Select Status">

                        <datalist id="status-option">
                            <option *ngFor="let option of statusOptions" [value]="option">
                            </option>
                        </datalist>

                        <small class="text-danger" *ngIf="ticketForm.get('status')?.touched &&
                                   ticketForm.get('status')?.invalid">
                            Status is required
                        </small>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="priority">
                            Priority
                        </label>

                        <input class="form-select" list="priority-option" id="priority" formControlName="priority"
                            (input)="validPriority()" placeholder="Select Priority">

                        <datalist id="priority-option">
                            <option *ngFor="let option of priorityOptions" [value]="option">
                            </option>
                        </datalist>

                        <small class="text-danger" *ngIf="ticketForm.get('priority')?.touched &&
                                   ticketForm.get('priority')?.invalid">
                            Priority is required
                        </small>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="assignee">
                            Assignee
                        </label>

                        <input class="form-select" list="assignee-option" id="assignee" formControlName="assignee"
                            (input)="validAssignee()" placeholder="Select Assignee">

                        <datalist id="assignee-option">
                            <option *ngFor="let option of assigneeOption" [value]="option">
                            </option>
                        </datalist>
                        <small class="text-danger" *ngIf="ticketForm.get('assignee')?.touched &&
                                   ticketForm.get('assignee')?.invalid">
                            Assignee is required
                        </small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Timeline -->

        <div class="card shadow-sm mb-4">
            <div class="card-header fw-bold">
                <i class="fa-solid fa-calendar-days"></i>
                Timeline
            </div>

            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="startDate">
                            Start Date
                        </label>

                        <input type="date" class="form-control" id="startDate" formControlName="startDate">

                        <small class="text-danger" *ngIf="ticketForm.get('startDate')?.touched &&
                                   ticketForm.get('startDate')?.invalid">
                            Start Date is required
                        </small>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="dueDate">
                            Due Date
                        </label>

                        <input type="date" class="form-control" id="dueDate" formControlName="dueDate"
                            [min]="ticketForm.get('startDate')?.value">

                        <small class="text-danger" *ngIf="ticketForm.get('dueDate')?.touched &&
                                   ticketForm.get('dueDate')?.invalid">
                            Due Date is required
                        </small>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="updatedDate">
                            Updated Date
                        </label>
                        <input type="date" class="form-control" id="updatedDate" formControlName="updatedDate"
                            [min]="ticketForm.get('startDate')?.value">
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress -->

        <div class="card shadow-sm mb-4">
            <div class="card-header fw-bold">
                <i class="fa-solid fa-chart-bar"></i>
                Progress & Estimation
            </div>

            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="progress">
                            Progress (%)
                        </label>

                        <input type="number" class="form-control" id="progress" formControlName="progress"
                            appPercentageValidation>

                        <small class="text-danger" *ngIf="ticketForm.get('progress')?.touched &&
                                   ticketForm.get('progress')?.invalid">
                            Progress is required
                        </small>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="estimstedHours">
                            Estimated Hours
                        </label>

                        <input type="number" class="form-control" id="estimstedHours" formControlName="estimatedHours"
                            appEstimatedHoursValidation>

                        <small class="text-danger" *ngIf="ticketForm.get('estimatedHours')?.touched &&
                                   ticketForm.get('estimatedHours')?.invalid">
                            Estimated Hours is required
                        </small>
                    </div>
                </div>
            </div>
        </div>

        <div class="sticky-footer">
            <button type="submit" class="btn btn-primary">
                {{ editId ? 'Update Ticket' : 'Create Ticket' }}
            </button>
        </div>
    </form>
</div>
